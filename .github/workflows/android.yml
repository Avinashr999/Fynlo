name: Android CI

on:
  push:
    branches: [master]
    # Don't burn CI minutes on documentation-only commits (governance docs,
    # docs/ Pages site). The workflow files themselves are NOT ignored, so
    # changes to .github/workflows/ still trigger validation runs.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Build & Unit Test (all pushes)
  # Builds the `prod` flavor only. `assembleDebug` / `test` are aggregate tasks
  # that ALSO build the `dev` flavor (applicationId app.fynlo.dev), whose
  # google-services.json is gitignored and absent in CI — the Google Services
  # plugin then fails with "No matching client found for package name
  # app.fynlo.dev". Scoping to the prod variant (whose google-services.json IS
  # committed) is what makes this job green. See INF01 in UX_AUDIT_2026-05-25.md.
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build prod debug APK
        run: ./gradlew assembleProdDebug --no-daemon

      - name: Run unit tests (prod debug)
        run: ./gradlew testProdDebugUnitTest --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Release build verification (master only, not PRs)
  # Verification-only: assembles an UNSIGNED prod release APK to confirm the
  # release pipeline (R8 minify + resource shrinking + lintVital) works. No
  # signing is done here — when no keystore is configured, build.gradle.kts
  # produces app-prod-release-unsigned.apk. Move signed/published builds to a
  # dedicated tag-triggered workflow with verified secrets when needed.
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Release build (verify, unsigned)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Assemble prod release (unsigned)
        run: ./gradlew :app:assembleProdRelease
