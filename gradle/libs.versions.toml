[versions]
firebaseBom = "34.15.0"
agp = "9.2.1"
coreKtx = "1.18.0"
junit = "4.13.2"
junitVersion = "1.3.0"
espressoCore = "3.7.0"
lifecycleRuntimeKtx = "2.10.0"
lifecycleViewmodelCompose = "2.10.0"
activityCompose = "1.13.0"
kotlin = "2.3.21"
composeBom = "2026.06.00"
firebaseAi = "17.13.0"
googleGmsGoogleServices = "4.5.0"
room = "2.8.4"
navigationCompose = "2.9.8"
kotlinxSerialization = "1.11.0"
ksp = "2.3.9"
poi = "5.5.1"
hilt = "2.59.2"
hiltNavigationCompose = "1.3.0"
# Performance benchmarking — alpha required because Fynlo uses AGP 9.x
benchmark = "1.5.0-alpha06"
baselineprofile = "1.5.0-alpha06"
profileinstaller = "1.4.1"
